<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#135457">
  <link rel="apple-touch-icon" href="https://i.imgur.com/OBFb4tJ.png">
  <link rel="icon" type="image/png" href="https://i.imgur.com/OBFb4tJ.png">
  <title>Movimiento de Tesorería – La Eugenia</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --petroleo: #135457;
      --lima:     #c4df57;
      --naranja:  #deaf4d;
      --verdecl:  #b7d6b5;
      --blanco:   #ffffff;
      --hueso:    #f5f3ec;
      --negro:    #000000;
    }
    body { margin: 0; min-height: 100vh; background: var(--petroleo); font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }

    @keyframes fadeInScreen {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card { background: var(--verdecl); border-radius: 24px; width: 100%; max-width: 430px; padding: 22px 20px; text-align: center; box-sizing: border-box; box-shadow: 0 10px 28px rgba(0,0,0,0.4); animation: fadeInScreen 0.3s ease-out; }
    .logo-wrap img { width: 198px; height: auto; display: block; margin: auto; filter: drop-shadow(0 4px 7px rgba(0,0,0,0.2)); }
    h1 { margin: 0; color: var(--negro); font-family: Impact, sans-serif; font-size: 34px; line-height: 0.95; letter-spacing: 1px; text-transform: uppercase; }
    @media (max-width: 380px) { h1 { font-size: 28px; } .valor { font-size: 17px !important; } }
    .periodo { margin-top: 8px; margin-bottom: 18px; color: var(--petroleo); font-size: 18px; font-weight: 900; text-transform: uppercase; }
    .dato { background: var(--blanco); border-radius: 14px; padding: 12px; margin: 12px 0; }
    .dato-titulo { color: var(--petroleo); font-size: 14px; font-weight: 900; text-transform: uppercase; }
    .valor { margin-top: 4px; color: var(--petroleo); font-size: 20px; font-weight: 900; }

    .btn-outline, .btn-solid {
      display: block;
      width: 100%;
      max-width: 480px;
      border-radius: 10px;
      padding: 14px;
      font-family: Impact, sans-serif;
      font-size: 1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-sizing: border-box;
      text-align: center;
      text-decoration: none;
      border: 2px solid var(--petroleo);
      cursor: pointer;
    }
    .btn-outline { margin: 10px auto 0; background: var(--naranja); color: var(--petroleo); }
    .btn-solid { margin: 36px auto 0; background: var(--lima); color: var(--petroleo); }
    .btn-solid { background: var(--lima); color: var(--petroleo); }
    .btn-outline:hover, .btn-solid:hover { opacity: 0.88; }
    .btn-outline, .btn-solid { transition: transform 0.08s, box-shadow 0.08s, opacity 0.15s; }
    .btn-outline:active, .btn-solid:active {
      transform: scale(0.96);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .footer { margin-top: 16px; color: var(--petroleo); font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="https://i.imgur.com/OBFb4tJ.png" alt="Logo La Eugenia">
    </div>
    <h1>MOVIMIENTO DE<br>TESORERÍA</h1>
    <div class="periodo" id="periodo">Cargando...</div>
    <div class="dato">
      <div class="dato-titulo">Ingresos</div>
      <div class="valor" id="ingresos">—</div>
    </div>
    <div class="dato">
      <div class="dato-titulo">Egresos</div>
      <div class="valor" id="egresos">—</div>
    </div>
    <div class="dato">
      <div class="dato-titulo">Resultado</div>
      <div class="valor" id="resultado">—</div>
    </div>
    <a class="btn-outline" id="btnPdf" href="#" target="_blank">Ver informe PDF</a>
    <div class="footer" id="footer"></div>
  </div>

  <a class="btn-solid" href="https://clubdecampolaeugenia.taplink.site/" target="_top">Ir al Centro de Gestión Vecinal</a>


  <script>
    const DATA_URL = 'https://script.google.com/macros/s/AKfycbzqf-oxbyV-SsQaUZj_C33xSQMX7h4V-g5Ws8EcXQ49nOYpn1_VWVwNhjnj3yd9PD_Syg/exec';

    function formatoPesos(valor) {
      return '$ ' + Number(valor).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    fetch(DATA_URL)
      .then(res => res.json())
      .then(d => {
        if (d.error) { document.getElementById('periodo').innerText = d.error; return; }
        document.getElementById('periodo').innerText   = d.periodo;
        document.getElementById('ingresos').innerText  = formatoPesos(d.ingresos);
        document.getElementById('egresos').innerText   = formatoPesos(d.egresos);
        document.getElementById('resultado').innerText = formatoPesos(d.resultado);
        document.getElementById('btnPdf').href = 'https://drive.google.com/file/d/' + d.pdfId + '/view';
        document.getElementById('footer').innerHTML = 'Fuente: José Luis Calvo<br>Última actualización: ' + d.fechaActualizacion;
      })
      .catch(() => { document.getElementById('periodo').innerText = 'Error cargando datos'; });
  </script>
</body>
</html>
